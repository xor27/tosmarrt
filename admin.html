<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Tryout UTBK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 30px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin-bottom: 30px;
        }
        
        .header h1 {
            background: linear-gradient(90deg, #7b2cbf, #9b4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.5em;
        }
        
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(0,0,0,0.5);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }
        
        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1em;
        }
        
        .login-box button {
            padding: 12px 30px;
            background: linear-gradient(90deg, #7b2cbf, #9b4dff);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .results-table {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        th {
            background: rgba(123, 44, 191, 0.3);
            color: #9b4dff;
            font-weight: 600;
        }
        
        tr:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .btn-detail {
            background: #7b2cbf;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            margin-right: 5px;
        }
        
        .btn-export {
            background: #28a745;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            margin: 20px 0;
            font-size: 1em;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            width: 90%;
        }
        
        .modal-content h3 {
            color: #9b4dff;
            margin-bottom: 20px;
        }
        
        .close-modal {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #aaa;
        }
        
        .close-modal:hover {
            color: white;
        }
        
        .answer-detail {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 15px;
            flex: 1;
            text-align: center;
        }
        
        .stat-card h3 {
            color: #9b4dff;
            font-size: 2em;
        }
        
        .result-item-sub {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .result-item-sub strong {
            color: #9b4dff;
        }
        
        @media (max-width: 768px) {
            th, td {
                padding: 8px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="admin-login" class="login-box">
            <h2>🔐 Admin Panel</h2>
            <input type="password" id="admin-password" placeholder="Masukkan password admin">
            <button onclick="loginAdmin()">Login</button>
            <p style="margin-top: 20px; color: #aaa;">Password default: <strong>admin123</strong></p>
        </div>
        
        <div id="admin-dashboard" style="display: none;">
            <div class="header">
                <h1>📊 Admin Dashboard - Hasil Tryout</h1>
                <p>Lihat jawaban detail peserta tryout (skala 0-1000)</p>
            </div>
            
            <div class="stats" id="stats-container"></div>
            
            <button class="btn-export" onclick="exportAllData()">📥 Export Semua Data (JSON)</button>
            <button class="btn-export" onclick="exportToCSV()" style="background: #17a2b8;">📊 Export ke CSV</button>
            <button class="btn-export" onclick="clearAllData()" style="background: #dc3545;">🗑️ Hapus Semua Data</button>
            
            <div class="results-table">
                <table id="results-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama</th>
                            <th>Kode</th>
                            <th>Tanggal</th>
                            <th>Skor (0-1000)</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="results-body">
                        <tr><td colspan="6" style="text-align: center;">Belum ada数据</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 id="modal-title">Detail Jawaban</h3>
            <div id="modal-body"></div>
        </div>
    </div>
    
    <script>
        const ADMIN_PASSWORD = "admin123";
        
        function loginAdmin() {
            const password = document.getElementById('admin-password').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('admin-login').style.display = 'none';
                document.getElementById('admin-dashboard').style.display = 'block';
                loadResults();
            } else {
                alert('Password salah!');
            }
        }
        
        // Fungsi untuk menghitung skor dari data mentah (sama seperti di peserta)
        function calculateFinalScoreFromData(student) {
            let totalCorrectPoints = 0;
            let totalPointsAll = 0;
            
            for (let i = 0; i < 7; i++) {
                if (student.scores && student.scores[i]) {
                    totalCorrectPoints += student.scores[i].correctPoints;
                    totalPointsAll += student.scores[i].totalPoints;
                }
            }
            
            return totalPointsAll > 0 ? Math.round((totalCorrectPoints / totalPointsAll) * 1000) : 0;
        }
        
        function loadResults() {
            const results = JSON.parse(localStorage.getItem('tryout_results') || '[]');
            const tbody = document.getElementById('results-body');
            const statsContainer = document.getElementById('stats-container');
            
            if (results.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Belum ada data tryout</td></tr>';
                statsContainer.innerHTML = '<div class="stat-card"><h3>0</h3><p>Total Peserta</p></div>';
                return;
            }
            
            const totalParticipants = results.length;
            let totalScoreAll = 0;
            
            results.forEach(r => {
                const finalScore = calculateFinalScoreFromData(r);
                totalScoreAll += finalScore;
            });
            
            const avgScore = totalParticipants > 0 ? Math.round(totalScoreAll / totalParticipants) : 0;
            
            statsContainer.innerHTML = `
                <div class="stat-card"><h3>${totalParticipants}</h3><p>Total Peserta</p></div>
                <div class="stat-card"><h3>${avgScore}</h3><p>Rata-rata Skor</p></div>
            `;
            
            let html = '';
            results.forEach((r, idx) => {
                const finalScore = calculateFinalScoreFromData(r);
                
                let scoreColor = '#ffc107';
                if (finalScore >= 800) scoreColor = '#28a745';
                else if (finalScore >= 600) scoreColor = '#ffc107';
                else scoreColor = '#dc3545';
                
                html += `
                    <tr>
                        <td>${idx + 1}</td>
                        <td>${r.name}</td>
                        <td>${r.code}</td>
                        <td>${r.date || new Date(r.timestamp).toLocaleString('id-ID')}</td>
                        <td style="color: ${scoreColor}; font-weight: bold;">${finalScore} / 1000</td>
                        <td>
                            <button class="btn-detail" onclick="showDetail('${r.code}')">📋 Detail</button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }
        
        function showDetail(code) {
            const results = JSON.parse(localStorage.getItem('tryout_results') || '[]');
            const student = results.find(r => r.code === code);
            
            if (!student) {
                alert('Data tidak ditemukan');
                return;
            }
            
            const modalTitle = document.getElementById('modal-title');
            const modalBody = document.getElementById('modal-body');
            
            // Hitung skor akhir menggunakan fungsi yang sama
            let totalCorrectAll = 0;
            let totalPointsAll = 0;
            for (let i = 0; i < 7; i++) {
                if (student.scores && student.scores[i]) {
                    totalCorrectAll += student.scores[i].correctPoints;
                    totalPointsAll += student.scores[i].totalPoints;
                }
            }
            const finalScore = totalPointsAll > 0 ? Math.round((totalCorrectAll / totalPointsAll) * 1000) : 0;
            
            let finalScoreColor = '#ffc107';
            if (finalScore >= 800) finalScoreColor = '#28a745';
            else if (finalScore >= 600) finalScoreColor = '#ffc107';
            else finalScoreColor = '#dc3545';
            
            modalTitle.innerHTML = `📝 Detail Hasil ${student.name} (${student.code})`;
            
            let html = `<p><strong>Tanggal:</strong> ${student.date || new Date(student.timestamp).toLocaleString('id-ID')}</p>`;
            
            // Tampilkan skor akhir
            html += `
                <div style="background: linear-gradient(90deg, rgba(123,44,191,0.3), rgba(155,77,255,0.3)); padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center;">
                    <h3>🎯 SKOR AKHIR</h3>
                    <p style="font-size: 2.5em; margin: 5px 0; font-weight: bold; color: ${finalScoreColor};">${finalScore}</p>
                    <p style="font-size: 1em;">dari 1000</p>
                    <div style="display: flex; justify-content: center; gap: 20px; margin-top: 10px;">
                        <div>✅ Benar: <strong>${totalCorrectAll}</strong> poin</div>
                        <div>📊 Total Poin: <strong>${totalPointsAll}</strong></div>
                    </div>
                </div>
            `;
            
            // Tampilkan skor per subtest
            html += `<p><strong>📋 Detail Per Subtest:</strong></p>`;
            
            for (let i = 0; i < 7; i++) {
                if (student.scores && student.scores[i]) {
                    const subtestScore = Math.round((student.scores[i].correctPoints / student.scores[i].totalPoints) * 1000);
                    let subtestColor = '#ffc107';
                    if (subtestScore >= 800) subtestColor = '#28a745';
                    else if (subtestScore >= 600) subtestColor = '#ffc107';
                    else subtestColor = '#dc3545';
                    
                    html += `
                        <div class="result-item-sub">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <strong>${i+1}. ${student.scores[i].subtestName}</strong>
                                <span style="font-weight: bold; color: ${subtestColor};">${subtestScore} / 1000</span>
                            </div>
                            <div style="display: flex; gap: 15px; flex-wrap: wrap; font-size: 0.85em;">
                                <span>✅ Benar: ${student.scores[i].correctPoints}</span>
                                <span>❌ Salah: ${student.scores[i].totalPoints - student.scores[i].correctPoints}</span>
                                <span>⚪ Total Poin: ${student.scores[i].correctPoints}/${student.scores[i].totalPoints}</span>
                            </div>
                        </div>
                    `;
                }
            }
            
            html += `<p style="margin-top: 15px;"><strong>📝 Detail Jawaban (JSON):</strong></p>`;
            html += `<div class="answer-detail" style="overflow-x: auto; max-height: 300px;">
                <pre style="color: #0f0; font-size: 11px;">${JSON.stringify(student.answers, null, 2)}</pre>
            </div>`;
            
            modalBody.innerHTML = html;
            document.getElementById('detail-modal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('detail-modal').classList.remove('active');
        }
        
        function exportAllData() {
            const results = localStorage.getItem('tryout_results');
            const blob = new Blob([results], {type: 'application/json'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `tryout_results_${new Date().toISOString().slice(0,19)}.json`;
            link.click();
            alert('Data berhasil diekspor!');
        }
        
        function exportToCSV() {
            const results = JSON.parse(localStorage.getItem('tryout_results') || '[]');
            if (results.length === 0) {
                alert('Tidak ada data');
                return;
            }
            
            let csv = "Nama,Kode,Tanggal,SkorAkhir,DetailPerSubtest\n";
            results.forEach(r => {
                let totalCorrect = 0;
                let totalPoints = 0;
                for (let i = 0; i < 7; i++) {
                    if (r.scores && r.scores[i]) {
                        totalCorrect += r.scores[i].correctPoints;
                        totalPoints += r.scores[i].totalPoints;
                    }
                }
                const finalScore = totalPoints > 0 ? Math.round((totalCorrect / totalPoints) * 1000) : 0;
                
                let subtestDetails = "";
                for (let i = 0; i < 7; i++) {
                    if (r.scores && r.scores[i]) {
                        subtestDetails += `${i+1}.${r.scores[i].subtestName}: ${r.scores[i].correctPoints}/${r.scores[i].totalPoints} | `;
                    }
                }
                
                const row = `"${r.name}","${r.code}","${r.date}","${finalScore}","${subtestDetails}"`;
                csv += row + "\n";
            });
            
            const blob = new Blob([csv], {type: 'text/csv'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `tryout_results_${new Date().toISOString().slice(0,19)}.csv`;
            link.click();
        }
        
        function clearAllData() {
            if (confirm('⚠️ PERINGATAN! Ini akan menghapus SEMUA data tryout siswa.\n\nApakah Anda yakin?')) {
                localStorage.removeItem('tryout_results');
                alert('Semua data telah dihapus!');
                loadResults();
            }
        }
        
        window.onload = function() {
            if (sessionStorage.getItem('admin_logged') === 'true') {
                document.getElementById('admin-login').style.display = 'none';
                document.getElementById('admin-dashboard').style.display = 'block';
                loadResults();
            }
        };
        
        const originalLoginAdmin = loginAdmin;
        window.loginAdmin = function() {
            const password = document.getElementById('admin-password').value;
            if (password === ADMIN_PASSWORD) {
                sessionStorage.setItem('admin_logged', 'true');
                originalLoginAdmin();
            } else {
                alert('Password salah!');
            }
        };
    </script>
</body>
</html>
